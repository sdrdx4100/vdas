name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check app scripts tests run.py
      - name: Check JavaScript syntax
        shell: bash
        run: find app/static/js -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Test
        run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=75
